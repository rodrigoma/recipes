	<!-- load recipes from json file -->
	<script>
		let files = [];
		fetch('recipes.json')
			.then(response => response.json())
			.then(data => {
				files = data;
				// trigger the recipe list generation
				if (typeof loadRecipeList === 'function') {
					loadRecipeList();
				}
			})
			.catch(error => console.error('Error loading recipes:', error));
	</script>
	
	<!-- javascript does the rest :) -->
